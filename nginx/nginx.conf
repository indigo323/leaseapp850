# Basic reverse proxy in front of the FastAPI app.
# Cloudflare terminates TLS at the edge, so we only speak HTTP here.

# Rate-limit /submit so a bot can't flood SignWell with document creations.
limit_req_zone $binary_remote_addr zone=submit_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Don't advertise nginx version
    server_tokens off;

    # Max upload size — intake form is tiny, but keep a sane ceiling.
    client_max_body_size 2m;

    location /submit {
        limit_req zone=submit_limit burst=3 nodelay;
        proxy_pass http://lease-app:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;   # PDF gen + SignWell call can take a moment
    }

    location / {
        proxy_pass http://lease-app:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Cache the stylesheet a bit
    location /static/ {
        proxy_pass http://lease-app:8000;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public";
    }
}
